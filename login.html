<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Under Construction</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg, #0f172a, #1e293b, #111827);
      overflow:hidden;
      color:white;
    }

    /* Animated background circles */
    .circle{
      position:absolute;
      border-radius:50%;
      background: rgba(255,255,255,0.08);
      animation: float 10s infinite ease-in-out;
    }

    .circle:nth-child(1){
      width:200px;
      height:200px;
      top:10%;
      left:10%;
    }

    .circle:nth-child(2){
      width:300px;
      height:300px;
      bottom:10%;
      right:10%;
      animation-duration:14s;
    }

    .circle:nth-child(3){
      width:150px;
      height:150px;
      bottom:20%;
      left:20%;
      animation-duration:12s;
    }

    @keyframes float{
      0%,100%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(-30px);
      }
    }

    .container{
      position:relative;
      z-index:2;
      text-align:center;
      padding:50px;
      background: rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border-radius:20px;
      width:90%;
      max-width:700px;
      box-shadow:0 10px 40px rgba(0,0,0,0.4);
    }

    .icon{
      font-size:80px;
      margin-bottom:20px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce{
      0%,100%{
        transform:translateY(0);
      }
      50%{
        transform:translateY(-10px);
      }
    }

    h1{
      font-size:3rem;
      margin-bottom:15px;
      letter-spacing:2px;
    }

    p{
      font-size:1.2rem;
      color:#d1d5db;
      line-height:1.6;
      margin-bottom:25px;
    }

    .timer{
      display:inline-block;
      padding:15px 30px;
      border-radius:50px;
      background:#22c55e;
      color:white;
      font-weight:bold;
      font-size:1.1rem;
      box-shadow:0 5px 20px rgba(34,197,94,0.5);
    }

    .loader{
      margin:30px auto 0;
      width:80%;
      height:12px;
      background:rgba(255,255,255,0.1);
      border-radius:20px;
      overflow:hidden;
    }

    .loader span{
      display:block;
      height:100%;
      width:70%;
      background:linear-gradient(90deg,#38bdf8,#22c55e);
      animation: loading 3s infinite;
      border-radius:20px;
    }

    @keyframes loading{
      0%{
        width:0%;
      }
      100%{
        width:100%;
      }
    }

    footer{
      margin-top:25px;
      font-size:0.9rem;
      color:#9ca3af;
    }

    @media(max-width:600px){
      h1{
        font-size:2rem;
      }

      p{
        font-size:1rem;
      }

      .icon{
        font-size:60px;
      }
    }
  </style>
</head>

<body>

  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>

  <div class="container">
    <div class="icon">🚧</div>

    <h1>Website Under Construction</h1>

    <p>
      We're currently improving the website experience.<br>
      Some features may not work properly right now.
    </p>

    <div class="timer">
      ⚡ Expected Fix Time: Within a Few Hours
    </div>

    <div class="loader">
      <span></span>
    </div>

    <footer>
      Thank you for your patience ❤️
    </footer>
  </div>

</body>
</html>
